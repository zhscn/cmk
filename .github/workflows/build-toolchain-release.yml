name: build-toolchain-release

# Manually triggered: pulls the pre-built builder image from GHCR (built by
# build-base-image.yml) and runs `cmk toolchain build` to produce the
# tarballs + manifest fragment for one platform. Currently scoped to
# linux-x86_64 (built on el7 for glibc 2.17 baseline); extend the matrix as
# more runners come online (linux-aarch64 = ubuntu-24.04-arm + el8 image,
# darwin-arm64 = macos-14).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "LLVM version (e.g. 22.1.4)"
        required: true
        default: "22.1.4"

permissions:
  contents: read
  packages: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            recipe_tag: el7-x86-1

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        # The builder image is ~1.4GB and the LLVM build tree easily wants
        # 30GB intermediate. Drop preinstalled tools we don't use.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build cmk CLI
        run: cargo build --release -p cmk-cli

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull builder image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/cmk-builder:${{ matrix.recipe_tag }}
        run: docker pull "$IMAGE"

      - name: cmk toolchain build
        env:
          VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/cmk-builder:${{ matrix.recipe_tag }}
        run: |
          ./target/release/cmk toolchain build "$VERSION" \
            --target "$TARGET" \
            --image "$IMAGE"

      - name: Upload tarballs + manifest fragment
        uses: actions/upload-artifact@v4
        with:
          name: clang-${{ inputs.version }}-${{ matrix.target }}
          path: ~/.cmk/build-cache/${{ inputs.version }}-${{ matrix.target }}/dist/
          if-no-files-found: error
          retention-days: 30
