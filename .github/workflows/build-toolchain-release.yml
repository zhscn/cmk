name: build-toolchain-release

# Manually triggered: builds an LLVM release for one platform and uploads
# the cmk packaging (toolchain/devel/tools-extra tarballs + manifest fragment)
# as a workflow artifact. Currently scoped to linux-x86_64 (built on el7 for
# glibc 2.17 baseline); extend the matrix as more runners come online
# (linux-aarch64 = ubuntu-24.04-arm + el8 image, darwin-arm64 = macos-14).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "LLVM version (e.g. 22.1.4)"
        required: true
        default: "22.1.4"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            platform: linux/amd64
            base_dockerfile: builder-images/base/Dockerfile.el7-x86_64
            recipe_dockerfile: builder-images/recipe/Dockerfile.el7-x86_64
            base_tag: cmk-builder-base:el7-x86-1
            recipe_tag: cmk-builder:el7-x86-1
            cache_scope: base-el7-x86

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        # ubuntu-latest ships ~14GB free; the LLVM bootstrap easily wants
        # 30GB intermediate. Drop preinstalled tools we don't use.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Build cmk CLI
        run: cargo build --release -p cmk-cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build builder base image
        # First run on a fresh runner: ~1.5h (deps + 2-stage clang bootstrap).
        # Subsequent runs reuse the GHA cache — usually a couple of minutes.
        uses: docker/build-push-action@v5
        with:
          context: builder-images/base
          file: ${{ matrix.base_dockerfile }}
          platforms: ${{ matrix.platform }}
          tags: ${{ matrix.base_tag }}
          load: true
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          build-args: |
            JOBS=4

      - name: Build recipe image
        uses: docker/build-push-action@v5
        with:
          context: builder-images/recipe
          file: ${{ matrix.recipe_dockerfile }}
          platforms: ${{ matrix.platform }}
          tags: ${{ matrix.recipe_tag }}
          load: true
          build-args: |
            BASE=${{ matrix.base_tag }}

      - name: cmk toolchain build
        env:
          VERSION: ${{ inputs.version }}
          TARGET: ${{ matrix.target }}
          IMAGE: ${{ matrix.recipe_tag }}
        run: |
          ./target/release/cmk toolchain build "$VERSION" \
            --target "$TARGET" \
            --image "$IMAGE"

      - name: Upload tarballs + manifest fragment
        uses: actions/upload-artifact@v4
        with:
          name: clang-${{ inputs.version }}-${{ matrix.target }}
          path: ~/.cmk/build-cache/${{ inputs.version }}-${{ matrix.target }}/dist/
          if-no-files-found: error
          retention-days: 30
