name: build-base-image

# Builds the cmk-builder image (host deps + 2-stage clang bootstrap on top
# of el7/el8 baseline) and pushes it to GHCR. Decoupled from
# build-toolchain-release because a cold-cache base image build alone runs
# ~3h on ubuntu-latest, eating most of the 6h job budget.
#
# Re-run only when builder-images/** or deps.lock changes; bump the rev
# label inside the Dockerfile + recipe_tag below in lockstep so consumers
# can pin a specific image revision.
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target to build"
        required: true
        default: "linux-x86_64"
        type: choice
        options:
          - linux-x86_64

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
            platform: linux/amd64
            base_dockerfile: builder-images/base/Dockerfile.el7-x86_64
            recipe_dockerfile: builder-images/recipe/Dockerfile.el7-x86_64
            base_tag: cmk-builder-base:el7-x86-1
            recipe_tag: el7-x86-1
            cache_scope: base-el7-x86

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    steps:
      - name: Free up disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build builder base image
        uses: docker/build-push-action@v5
        with:
          context: builder-images/base
          file: ${{ matrix.base_dockerfile }}
          platforms: ${{ matrix.platform }}
          tags: ${{ matrix.base_tag }}
          load: true
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          build-args: |
            JOBS=4

      - name: Build + push recipe image to GHCR
        # Recipe layer is one LABEL/WORKDIR change; baking it in carries all
        # base layers along, so consumers only need this one tag.
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/cmk-builder
          docker build \
            -f "${{ matrix.recipe_dockerfile }}" \
            -t "$IMAGE:${{ matrix.recipe_tag }}" \
            --build-arg "BASE=${{ matrix.base_tag }}" \
            builder-images/recipe
          docker push "$IMAGE:${{ matrix.recipe_tag }}"
