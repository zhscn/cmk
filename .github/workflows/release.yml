name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --locked --no-default-features --target ${{ matrix.target }}

      - name: Package
        run: tar czf cmk-${VERSION}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release cmk

      - uses: actions/upload-artifact@v4
        with:
          name: cmk-${{ env.VERSION }}-${{ matrix.target }}
          path: cmk-${{ env.VERSION }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: cmk-*/cmk-*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
